<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* latin-ext */
      @font-face {
        font-family: 'Inter';
        font-weight: 100 900;
        font-display: swap;
        src: url(https://fonts.gstatic.com/s/inter/v13/UcCo3FwrK3iLTcvsYwYZ8UA3J58.woff2)
          format('woff2');
        unicode-range:
          U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB,
          U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      /* latin */
      @font-face {
        font-family: 'Inter';
        font-weight: 100 900;
        font-display: swap;
        src: url(https://fonts.gstatic.com/s/inter/v13/UcCo3FwrK3iLTcviYwYZ8UA3.woff2)
          format('woff2');
        unicode-range:
          U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308,
          U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF,
          U+FFFD;
      }
      .title {
        font-size: 80px;
        font-weight: bold;
      }
      .font-arial {
        font-family: 'Arial';
      }
      .font-segoe {
        font-family: 'Segoe UI';
      }
      .font-inter {
        font-family: 'Inter';
      }
      .font-helvetica {
        font-family: 'Helvetica';
      }
      .font-sans-serif {
        font-family: sans-serif;
      }
      .font-system {
        font-family: system-ui;
      }
      .font-apple {
        font-family: -apple-system;
      }
      .font-ubuntu {
        font-family: 'Ubuntu';
      }
      .font-fangsong {
        font-family: 'fangsong';
      }
      .font-yahei {
        font-family: 'Microsoft YaHei';
      }
      .font-sim {
        font-family: 'SimSun';
      }
      /* Courier New */
      .font-courier {
        font-family: 'Courier New';
      }
      .font-roboto {
        font-family: 'Roboto';
      }
      /* Times New Roman */
      .font-times {
        font-family: 'Tahoma';
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="title">Notable Features</div>
      <div class="title font-inter">Notable Features</div>
      <div class="title font-arial">Notable Features</div>
      <div class="title font-segoe">Notable Features</div>
      <div class="title font-helvetica">Notable Features</div>
      <div class="title font-sans-serif">Notable Features</div>
      <div class="title font-system">Notable Features</div>
      <div class="title font-apple">Notable Features</div>
      <div class="title font-ubuntu">Notable Features</div>
      <div class="title font-fangsong">Notable Features</div>
      <div class="title font-yahei">Notable Features</div>
      <div class="title font-courier">Notable Features</div>
      <div class="title font-roboto">Notable Features</div>
      <div class="title font-times">Notable Features</div>
    </div>
  </body>
</html>
